info:
  name: Line Chart (Grouped)
  submission_date: '2026-05-03'
  family: Evolution
  pattern: 1 Year, 1 Numeric, 1 Categorical
  difficulty: Intermediate
  geom: geom_line
  show: trend
  sample_size: medium+
