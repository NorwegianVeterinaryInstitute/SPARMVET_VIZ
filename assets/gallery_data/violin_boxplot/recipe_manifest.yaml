info:
  name: Violin + Boxplot Overlay
  submission_date: '2026-05-03'
  family: Distribution
  pattern: 1 Numeric, 1 Categorical
  difficulty: Intermediate
data_path: example_data.tsv
plots:
  violin_boxplot:
    layers:
      - geom: geom_violin
        mapping:
          x: species
          y: mic_value
          fill: species
        params:
          alpha: 0.4
          trim: false
      - geom: geom_boxplot
        mapping:
          x: species
          y: mic_value
        params:
          width: 0.1
          outlier_alpha: 0.5
    labels:
      title: MIC Distribution — Violin + Boxplot
      x: Species
      y: MIC Value
wrangling:
  tier1: []
  tier2: []
  tier3: []
