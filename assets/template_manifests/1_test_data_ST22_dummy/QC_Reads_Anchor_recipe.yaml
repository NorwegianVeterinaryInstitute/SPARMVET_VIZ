# RELATIONAL ANCHOR: QC Reads
# Combines reads metrics (FastP) and taxonomy (Bracken) for QC.

- action: "join"
  right_ingredient: "metadata_schema"
  "on": ["sample_id"]
- action: "join"
  right_ingredient: "FastP"
  "on": ["sample_id"]
- action: "join"
  right_ingredient: "Bracken"
  "on": ["sample_id"]
