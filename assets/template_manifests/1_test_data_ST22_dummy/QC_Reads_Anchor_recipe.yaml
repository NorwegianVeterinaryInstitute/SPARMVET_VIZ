# RELATIONAL ANCHOR: QC Reads
# Combines reads metrics (FastP), assembly metrics (Quast), and taxonomy (Bracken) for QC.

- action: "join"
  right_ingredient: "Quast"
  "on": ["sample_id"]
- action: "join"
  right_ingredient: "Bracken"
  "on": ["sample_id"]
- action: "join"
  right_ingredient: "metadata_schema"
  "on": ["sample_id"]
