tier1:
  - action: "add_constant"
    new_column: "status"
    value: "Detected"

tier2:
  # Calculate total gene count per sample for sorting purposes
  - action: "count_by_group"
    group_by: ["sample_id"]
    new_column: "total_gene_count"

  # Sort primarily by total count (to see most resistant isolates together)
  - action: "sort"
    columns: ["total_gene_count", "sample_id"]
    descending: [true, false]
