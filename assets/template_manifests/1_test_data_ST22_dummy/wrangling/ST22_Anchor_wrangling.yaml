tier1:
  - action: "cast"
    columns: ["sample_id"]
    dtype: "String"

  # RELATIONAL ANCHOR: Master Cross-Dataset Integration
  # Purpose: Create a "Wide" Anchor table with metadata + AMR + MLST + Virulence.

  - action: "join"
    right_ingredient: "FastP"
    "on": ["sample_id"]

  - action: "join"
    right_ingredient: "ResFinder"
    "on": ["sample_id"]

  - action: "join"
    right_ingredient: "MLST"
    "on": ["sample_id"]

  - action: "join"
    right_ingredient: "VirulenceFinder"
    "on": ["sample_id"]

  # Whitelist virulence genes against APEC STEC reference table (filter + rename)
  - action: "join_filter"
    right_ingredient: "APEC_STEC_virulence_genes"
    left_on: "VF_gene"
    right_on: "Gene_name"

  - action: "rename"
    mapping:
      "VF_gene": "Selected_Virulence_Genes"

# tier2: aggregation / sorting for cross-dataset visualizations
tier2:
  # 1. Provide virulence gene count for sorting
  - action: "count_by_group"
    group_by: ["sample_id"]
    new_column: "virulence_count"

  # 2. Sort samples by virulence count (primary) to highlight high-risk isolates
  - action: "sort"
    columns: ["virulence_count", "sample_id"]
    descending: [true, false]
