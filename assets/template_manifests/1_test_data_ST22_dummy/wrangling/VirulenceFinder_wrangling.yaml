tier1:
  - action: "keep_columns"
    columns: ["sample_id", "serotype", "virulence_raw"]
  - action: "split_and_explode"
    columns: ["virulence_raw"]
    separator: ","
  - action: "strip_whitespace"
    columns: ["virulence_raw"]
  - action: "split_column"
    source: "virulence_raw"
    new_columns: ["VF_gene", "VF_protein"]
    delimiter: ": "
    drop_source: true
  - action: "strip_whitespace"
  - action: "unique_rows"
# tier2: not needed — wide per-gene format ready for dot/heatmap plots
