# Local System Connector (Testing)
# Actively routes the backend components to the test harness paths.
locations:
  # Location 1: Raw ingestion data
  raw_data: "assets/test_data/"
  
  # Location 2: Pipeline Manifest definitions
  manifests: "config/manifests/pipelines/"
  
  # Location 3: Curated Anchors & Views (Tiers 1 & 2 Parquet)
  curated_data: "tmp/UI_TEST/parquet_data/"
  
  # Location 4: User specific artifacts, sessions, and Tier 3 outputs
  user_sessions: "tmp/UI_TEST/user/"
  
  # Location 5: Gallery examples and recipes
  gallery: "assets/gallery_data/"
