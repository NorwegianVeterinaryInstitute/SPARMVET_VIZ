# SPARMVET Pipeline Test Profile
# Simulates production connector behaviour: data is injected by the pipeline,
# not read from manifest source.path entries.
#
# prefer_discovery: true — orchestrator ignores manifest source.path and discovers
# files by schema ID name in raw_data. This exercises the same code path a real
# Galaxy/IRIDA connector would use.
#
# Use with pipeline-static or pipeline-exploration-simple persona:
#   SPARMVET_PROFILE=$ROOT/config/deployment/pipeline_test/pipeline_test_profile.yaml \
#   SPARMVET_PERSONA=$ROOT/config/ui/templates/pipeline-static_template.yaml \
#     $ROOT/.venv/bin/python -m shiny run $ROOT/app/src/main.py --port 8001

deployment_type: filesystem
deployment_name: "SPARMVET_VIZ (Pipeline Test)"

# prefer_discovery: true — ignore manifest source.path, discover files by schema
# ID name in raw_data. Mirrors production connector behaviour.
prefer_discovery: true

locations:
  # Raw data dir — points at ST22 duplicate with clean names, simulating pipeline output
  raw_data: "assets/test_data/duplicated_1_test_data_ST22_dummy/"

  # Standard locations — same as local dev
  manifests: "config/manifests/pipelines/"
  curated_data: "tmp/pipeline_test/parquet_data/"
  user_sessions: "tmp/pipeline_test/user/"
  gallery: "assets/gallery_data/"

runtime:
  python_interpreter: "./.venv/bin/python"
