# SPARMVET Deployment Profile Template
#
# Authority: ADR-048 — Multi-System Deployment Architecture
# Purpose: Describes how SPARMVET is deployed into a specific environment.
#          Copy this template, fill in your values, and point SPARMVET_PROFILE
#          at the resulting file (or place it at ~/.sparmvet/profile.yaml or
#          /etc/sparmvet/profile.yaml for auto-discovery).
#
# Resolution chain (first match wins):
#   1. SPARMVET_PROFILE env var → path to this file
#   2. ~/.sparmvet/profile.yaml
#   3. /etc/sparmvet/profile.yaml
#   4. config/deployment/local/local_profile.yaml (dev fallback)

# ─── Identity ─────────────────────────────────────────────────────────────────
# deployment_type: what kind of system is this?
#   "filesystem"  → Galaxy, general server, local PC (data is on disk)
#   "irida"       → IRIDA integration (data fetched via REST API first)
#   "galaxy"      → Galaxy GxIT (filesystem with Galaxy-specific env vars)
deployment_type: filesystem

# Human-readable label shown in app footer (optional).
deployment_name: "My Pipeline — Institution Name"

# ─── Default startup state (both optional) ────────────────────────────────────
# default_manifest: path to the pipeline manifest to load at startup.
#   - Relative to project_root (see below).
#   - If ABSENT: manifest selector is shown in the UI (persona-gated).
#   - If PRESENT: manifest is locked; lower personas never see the selector.
default_manifest: "manifests/pipeline_name/master.yaml"

# default_persona: which UI persona to activate at startup.
#   Options: pipeline-static | pipeline-exploration-simple |
#            pipeline-exploration-advanced | project-independent | developer
#   If absent: persona selector is shown (or defaults to pipeline-static).
default_persona: pipeline-static

# ─── Filesystem locations ─────────────────────────────────────────────────────
# project_root: absolute base path for this deployment.
#   All sub-paths under 'locations' are relative to this.
project_root: "PATH_TO_PROJECT_ROOT"

locations:
  # Location 1: Raw input files (TSV, Excel, VCF) before ingestion.
  #   Populated by the pipeline or by an admin. Read-only from app perspective.
  raw_data: "inputs/"

  # Location 2: Pipeline YAML manifests and wrangling recipes.
  #   Contains the master.yaml and its !include fragments.
  manifests: "manifests/"

  # Location 3: Tier 1 & 2 Parquet caches.
  #   Written by the DataOrchestrator at first run; read on subsequent runs.
  curated_data: "parquet/"

  # Location 4: User-writable space.
  #   Contains export bundles (zip), session saves, Tier 3 artifacts.
  #   Must be writable by the app process.
  user_sessions: "sessions/"

  # Location 5: Gallery assets (pre-rendered examples, recipe clones).
  #   Read-only from app perspective unless gallery indexing is run.
  gallery: "gallery/"

# ─── IRIDA block (required only when deployment_type: irida) ──────────────────
# NEVER put the OAuth2 token here — inject it via SPARMVET_IRIDA_TOKEN env var.
# irida:
#   base_url: "https://irida.myinstitution.ca"
#   project_id: 42
#   auth: oauth2         # token read from SPARMVET_IRIDA_TOKEN at runtime
#   local_cache: "/tmp/sparmvet_cache/inputs/"   # where API files land before app reads them

# ─── Runtime ──────────────────────────────────────────────────────────────────
runtime:
  python_interpreter: "./.venv/bin/python"

# ─── Notes ────────────────────────────────────────────────────────────────────
# Security:
#   - Never commit API tokens or passwords to this file.
#   - Tokens are always passed via environment variables.
#   - This file may be version-controlled when correctly configured (no secrets).
#
# Multiple pipelines:
#   Deploy one instance per pipeline (recommended), each with its own profile
#   pointing at different project_root + default_manifest values.
#   Alternatively, omit default_manifest and point manifests/ at a directory
#   containing multiple pipeline manifests — users pick from a dropdown.
#
# Galaxy:
#   Bundle this file inside the Docker image (or mount from a data library).
#   Reference it in the tool XML wrapper:
#     <environment_variable name="SPARMVET_PROFILE">/profiles/amr.yaml</environment_variable>
#
# IRIDA:
#   IRIDA injects SPARMVET_PROFILE and SPARMVET_IRIDA_TOKEN at container launch.
#   The app downloads IRIDA data to local_cache before starting — subsequent
#   behaviour is identical to a filesystem deployment.
