id: ST22_dummy_manifest
type: species
info:
  display_name: ST22 Dummy Dataset
  category: AMR Research
  description: Comprehensive manifest for ST22 Dummy dataset with advanced Virulence filtering.
  version: '1.3'

data_schemas:
  Summary: !include '1_test_data_ST22_dummy/Summary.yaml'
  FastP: !include '1_test_data_ST22_dummy/FastP.yaml'
  Quast: !include '1_test_data_ST22_dummy/Quast.yaml'
  Bracken: !include '1_test_data_ST22_dummy/Bracken.yaml'
  ResFinder: !include '1_test_data_ST22_dummy/ResFinder.yaml'
  MLST: !include '1_test_data_ST22_dummy/MLST_results.yaml'

additional_datasets_schemas:
  VirulenceFinder: !include '1_test_data_ST22_dummy/VirulenceFinder.yaml'
  
  APEC_STEC_virulence_genes:
    source:
      type: "local_tsv"
      path: "assets/ref_data/Virulence_genes_APEC/Virulence_genes_APEC.tsv"
    input_fields: !include '../../assets/ref_data/Virulence_genes_APEC/Virulence_genes_APEC_input_fields.yaml'
    wrangling:
      - action: "strip_whitespace"
    output_fields: [ ]

metadata_schema: !include '1_test_data_ST22_dummy/metadata_schema.yaml'

# Tier 1 Assembly: joins all datasets on sample_id
assembly_manifests:
  ST22_Anchor:
    recipe:
      - action: "join"
        right_ingredient: "metadata_schema"
        "on": ["sample_id"]
      - action: "join"
        right_ingredient: "FastP"
        "on": ["sample_id"]
      - action: "join"
        right_ingredient: "ResFinder"
        "on": ["sample_id"]
      - action: "join"
        right_ingredient: "MLST"
        "on": ["sample_id"]
      - action: "join"
        right_ingredient: "VirulenceFinder"
        "on": ["sample_id"]
      - action: "join_filter"
        right_ingredient: "APEC_STEC_virulence_genes"
        left_on: "VF_gene"
        right_on: "Gene_name"
      - action: "rename"
        mapping:
          "VF_gene": "Selected_Virulence_Genes"

# UI Classification (Tabs)
analysis_groups:
  Quality Control:
    description: "📊 Quality Control"
    plots:
      qc_reads_boxplot:
        factory_id: "boxplot_logic"
        target_dataset: "FastP"
        x: "sample_id"
        y: "total_reads"
        title: "Total Reads by Sample (QC)"
        family: "Distribution"
        pattern: "1 Numeric, 1 Categorical"
        difficulty: "Simple"
        
  Results:
    description: "💊 Results (AMR & Virulence)"
    plots:
      amr_heatmap:
        factory_id: "heatmap_logic"
        target_dataset: "ResFinder"
        x: "gene"
        y: "sample_id"
        color: "status"
        title: "AMR Gene Distribution"
        family: "Correlation"
        pattern: "1 Numeric, 2 Categorical"
        difficulty: "Intermediate"
      virulence_bar:
        factory_id: "bar_logic"
        target_dataset: "ST22_Anchor"
        x: "sample_id"
        y: "Selected_Virulence_Genes"
        title: "Selected Virulence Genes Count"
        family: "Ranking"
        pattern: "1 Numeric, 1 Categorical"
        difficulty: "Intermediate"

plot_defaults:
  height: 450
  theme: theme_minimal
  show_legend: true
