id: ST22_dummy_manifest
type: species
info:
  display_name: ST22 Dummy Dataset
  category: AMR Research
  description: Flat manifest structure for ST22 Dummy dataset following Abromics standard.
  version: '1.5'

data_schemas:
  Summary:
    source:
      type: "local_tsv"
      path: "assets/test_data/1_test_data_ST22_dummy/test_data_Summary_20260307_105756.tsv"
    input_fields: !include '1_test_data_ST22_dummy/Summary_input_fields.yaml'
    wrangling: !include '1_test_data_ST22_dummy/Summary_wrangling.yaml'
    output_fields: !include '1_test_data_ST22_dummy/Summary_output_fields.yaml'

  FastP:
    source:
      type: "local_tsv"
      path: "assets/test_data/1_test_data_ST22_dummy/test_data_FastP_20260307_105756.tsv"
    input_fields: !include '1_test_data_ST22_dummy/FastP_input_fields.yaml'
    wrangling: !include '1_test_data_ST22_dummy/FastP_wrangling.yaml'
    output_fields: !include '1_test_data_ST22_dummy/FastP_output_fields.yaml'

  Quast:
    source:
      type: "local_tsv"
      path: "assets/test_data/1_test_data_ST22_dummy/test_data_Quast_20260307_105756.tsv"
    input_fields: !include '1_test_data_ST22_dummy/Quast_input_fields.yaml'
    wrangling: !include '1_test_data_ST22_dummy/Quast_wrangling.yaml'
    output_fields: !include '1_test_data_ST22_dummy/Quast_output_fields.yaml'

  Bracken:
    source:
      type: "local_tsv"
      path: "assets/test_data/1_test_data_ST22_dummy/test_data_Bracken_20260307_105756.tsv"
    input_fields: !include '1_test_data_ST22_dummy/Bracken_input_fields.yaml'
    wrangling: !include '1_test_data_ST22_dummy/Bracken_wrangling.yaml'
    output_fields: !include '1_test_data_ST22_dummy/Bracken_output_fields.yaml'

  ResFinder:
    source:
      type: "local_tsv"
      path: "assets/test_data/1_test_data_ST22_dummy/test_data_ResFinder_20260307_105756.tsv"
    input_fields: !include '1_test_data_ST22_dummy/ResFinder_input_fields.yaml'
    wrangling: !include '1_test_data_ST22_dummy/ResFinder_wrangling.yaml'
    output_fields: !include '1_test_data_ST22_dummy/ResFinder_output_fields.yaml'

  MLST:
    source:
      type: "local_tsv"
      path: "assets/test_data/1_test_data_ST22_dummy/test_data_MLST_results_20260307_105756.tsv"
    input_fields: !include '1_test_data_ST22_dummy/MLST_input_fields.yaml'
    wrangling: !include '1_test_data_ST22_dummy/MLST_wrangling.yaml'
    output_fields: !include '1_test_data_ST22_dummy/MLST_output_fields.yaml'

additional_datasets_schemas:
  VirulenceFinder:
    source:
      type: "local_tsv"
      path: "assets/test_data/2_VIGAS-P_ST22_dummy/test_data_VIGAS_VirulenceFinder_20260307_105756.tsv"
    input_fields: !include '1_test_data_ST22_dummy/VirulenceFinder_input_fields.yaml'
    wrangling: !include '1_test_data_ST22_dummy/VirulenceFinder_wrangling.yaml'
    output_fields: !include '1_test_data_ST22_dummy/VirulenceFinder_output_fields.yaml'
  
  APEC_STEC_virulence_genes:
    source:
      type: "local_tsv"
      path: "assets/ref_data/Virulence_genes_APEC/Virulence_genes_APEC.tsv"
    input_fields: !include '../../assets/ref_data/Virulence_genes_APEC/Virulence_genes_APEC_input_fields.yaml'
    wrangling:
      - action: "strip_whitespace"
    output_fields: [ ]

metadata_schema:
  source:
    type: "local_tsv"
    path: "assets/test_data/1_test_data_ST22_dummy/test_metadata_20260307_105756.tsv"
  input_fields: !include '1_test_data_ST22_dummy/metadata_schema_input_fields.yaml'
  wrangling: !include '1_test_data_ST22_dummy/metadata_schema_wrangling.yaml'
  output_fields: !include '1_test_data_ST22_dummy/metadata_schema_output_fields.yaml'

# Tier 1 Assembly: joins all datasets on sample_id
assembly_manifests:
  ST22_Anchor:
    recipe:
      - action: "join"
        right_ingredient: "metadata_schema"
        "on": ["sample_id"]
      - action: "join"
        right_ingredient: "FastP"
        "on": ["sample_id"]
      - action: "join"
        right_ingredient: "ResFinder"
        "on": ["sample_id"]
      - action: "join"
        right_ingredient: "MLST"
        "on": ["sample_id"]
      - action: "join"
        right_ingredient: "VirulenceFinder"
        "on": ["sample_id"]
      - action: "join_filter"
        right_ingredient: "APEC_STEC_virulence_genes"
        left_on: "VF_gene"
        right_on: "Gene_name"
      - action: "rename"
        mapping:
          "VF_gene": "Selected_Virulence_Genes"
    final_contract: !include '1_test_data_ST22_dummy/ST22_Anchor_final_contract.yaml'

# UI Classification (Tabs)
analysis_groups:
  Quality Control:
    description: "📊 Quality Control"
    plots:
      qc_reads_boxplot:
        factory_id: "boxplot_logic"
        target_dataset: "FastP"
        x: "sample_id"
        y: "total_reads"
        title: "Total Reads by Sample (QC)"
        family: "Distribution"
        pattern: "1 Numeric, 1 Categorical"
        difficulty: "Simple"
        
  Results:
    description: "💊 Results (AMR & Virulence)"
    plots:
      amr_heatmap:
        factory_id: "heatmap_logic"
        target_dataset: "ResFinder"
        x: "gene"
        y: "sample_id"
        color: "status"
        title: "AMR Gene Distribution"
        family: "Correlation"
        pattern: "1 Numeric, 2 Categorical"
        difficulty: "Intermediate"
      virulence_bar:
        factory_id: "bar_logic"
        target_dataset: "ST22_Anchor"
        x: "sample_id"
        y: "Selected_Virulence_Genes"
        title: "Selected Virulence Genes Count"
        family: "Ranking"
        pattern: "1 Numeric, 1 Categorical"
        difficulty: "Intermediate"

plot_defaults:
  height: 450
  theme: theme_minimal
  show_legend: true
