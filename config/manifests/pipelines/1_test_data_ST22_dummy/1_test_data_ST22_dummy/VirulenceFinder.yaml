source:
  type: local_tsv
  path: "assets/test_data/2_VIGAS-P_ST22_dummy/test_data_VIGAS_VirulenceFinder_20260307_105756.tsv"

input_fields:
  sample_id:
    original_name: "sample_id"
    type: numeric
    is_primary_key: true
  serotype:
    original_name: "serotypefinder_serotype"
    type: categorical
  virulence_raw:
    original_name: "virulence_finder_virulencegenes_proteinname"
    type: categorical

output_fields:
  sample_id:
    type: numeric
  serotype:
    type: categorical
  VF_gene:
    type: categorical
  VF_protein:
    type: categorical

wrangling:
  - action: "keep_columns"
    columns: ["sample_id", "serotype", "virulence_raw"]
  - action: "split_and_explode"
    columns: ["virulence_raw"]
    separator: ","
  - action: "strip_whitespace"
    columns: ["virulence_raw"]
  - action: "split_column"
    source: "virulence_raw"
    new_columns: ["VF_gene", "VF_protein"]
    delimiter: ": "
    drop_source: true
  - action: "strip_whitespace"
  - action: "unique_rows"
