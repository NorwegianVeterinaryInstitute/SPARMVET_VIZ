# TIER 1 ASSEMBLY: Relational Joins for Master Collection
# Purpose: Create a "Wide" Anchor table containing all metadata and primary results.

- action: "join"
  right_ingredient: "metadata_schema"
  "on": ["sample_id"]

- action: "join"
  right_ingredient: "FastP"
  "on": ["sample_id"]

- action: "join"
  right_ingredient: "ResFinder"
  "on": ["sample_id"]

- action: "join"
  right_ingredient: "MLST"
  "on": ["sample_id"]

- action: "join"
  right_ingredient: "VirulenceFinder"
  "on": ["sample_id"]

# TIER 2 BRANCH: Filtering and Transformation
# Purpose: Whitelist virulence genes against APEC STEC reference table.
- action: "join_filter"
  right_ingredient: "APEC_STEC_virulence_genes"
  left_on: "VF_gene"
  right_on: "Gene_name"

# Clean up for Tier 3 View
- action: "rename"
  mapping:
    "VF_gene": "Selected_Virulence_Genes"
