# Assembly Recipe: Correlations & Specialization (Optimized Stage-Wise)
# 1. Start with 'Summary' and filter to Phenotypes ONLY
- action: "filter_eq"
  column: "category"
  value: "phenotype"

# 2. Score phenotypes: Susceptible=0, unknown=NA (ignored in sum), else=1
# This calculates one row per sample per resistance point
- action: "recode_values"
  column: "value"
  new_column: "resistance_points"
  rules:
    - { matches: "Susceptible", value: 0 }
    - { starts_with: "unknown", value: null }
    - { default: 1 }

# 3. Collapse into a Resistance Score (phenotype_count) per sample/ST
- action: "summarize"
  group_by: ["sample_id", "ST"]
  columns: ["resistance_points"]
  agg: "sum"
  new_name: "phenotype_count"

# 4. Join with Quality Metrics from the mirror table
- action: "join"
  right_ingredient: "Summary_quality"
  "on": "sample_id"

# 5. Advanced Visualization Prep: Unpivot quality metrics for Faceted Exploration
# This allows plotting multiple metrics against the same score in a single plot
- action: "unpivot"
  index: ["sample_id", "ST", "phenotype_count"]
  'on': ["genome_length", "N50", "contigs_sup300bp"]
  variable_name: "quality_metric"
  value_name: "quality_value"
