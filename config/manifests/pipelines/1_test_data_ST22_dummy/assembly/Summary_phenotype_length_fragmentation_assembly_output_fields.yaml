# Terminal Contract for Phenotype Correlation Curiosity
# Provides faceted view of quality metrics relative to phenotype scores
sample_id:
  type: categorical
  label: "Sample ID"

ST:
  type: categorical
  label: "Sequence Type"

phenotype_count:
  type: numeric
  label: "Resistance Score" # Count of non-Susceptible phenotypes per sample

quality_metric:
  type: categorical
  label: "Metric" # genome_length, N50, or contigs

quality_value:
  type: numeric
  label: "Value" # The actual measurement for the metric
