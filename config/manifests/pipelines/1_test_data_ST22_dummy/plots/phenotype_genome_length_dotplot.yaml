# Plot Spec: Correlating Resistance Scores with Assembly Quality
# Authoritative Standard: ADR-029a Plot Builder Scope
spec:
  title: "Phenotype Score correlation with Assembly Metrics"
  target_dataset: "Summary_phenotype_length_fragmentation" # Assembly ID from master manifest
  mapping:
    x: "phenotype_count"
    y: "quality_value"
    color: "ST"           # Overlay sequence type for context
  layers:
    - name: "geom_point"
      params: {alpha: 0.6, size: 2.5, position: "jitter"} # Jitter X since scores are integers
    - name: "geom_smooth" # The "Tendence" model suggested by User
      params: {method: "lm", se: true, color: "black", alpha: 0.2}
    - name: "facet_wrap"
      params: {facets: "~ quality_metric", scales: "free_y", ncol: 1} # Free scales since units differ
  labs:
    x: "Resistance Score (Count of Resistance Phenotypes)"
    y: "Metric Value"
    title: "How Resistance Phenotype Count influences Assembly Quality"
