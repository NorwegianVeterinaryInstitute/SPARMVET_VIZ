# wrangling for Summary dataset
# cast: cast a column to a specific data type
# divide_columns: divide a column by another column
# filter_range: filter rows based on a range of values
# drop_columns: drop columns from the dataset
tier1:
  # NOTE : unpivot implicitly drops unselected columns

  # NOTE Creating a long format of all those columns
  - action: "unpivot"
    index: ["sample_id", "ST"] # These are the columns that create the identity of the sample
    'on': ["genotype", "phenotype", "cge_phenotype", "plasmid"]
    variable_name: "category"
    value_name: "value"
  # split_and_explode: split a column by a separator and create a new row for each value
  - action: "split_and_explode"
    column: "value"
    separator: ", "
  # NOTE : Safety ensure that white spaces on left and right of values are removed
  - action: "strip_whitespace"
    columns: ["category", "value"]
  # NOTE : Now I want to keep only unique rows
  - action:  "drop_duplicates"
    columns: ["sample_id", "ST", "category", "value"]

  
