      Year: string
      Source: string
      Country: string
      gene: string
      predicted_phenotype_clean: string
      sample_id: string
      accession: string
      Multiresistant: string
  Plasmid_Profile_Joint:
    ingredients:
      - dataset_id: plasmid_data
      - dataset_id: metadata_schema
    recipe: !include 2_test_data_ST22_dummy/assembly/Plasmid_Profile_Joint.yaml
    final_contract:
      Year: string
      Source: string
      Country: string
      plasmid_name: string
      sample_id: string
      accession: string

