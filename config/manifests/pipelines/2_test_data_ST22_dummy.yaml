    type: "local_tsv"
    path: "assets/test_data/1_test_data_ST22_dummy/test_metadata_20260307_105756.tsv"
  input_fields: !include 2_test_data_ST22_dummy/input_fields/metadata_schema.yaml

data_schemas:
