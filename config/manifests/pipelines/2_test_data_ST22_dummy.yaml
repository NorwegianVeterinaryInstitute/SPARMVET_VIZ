    source:
      type: "local_tsv"
      path: "assets/test_data/1_test_data_ST22_dummy/test_data_ResFinder_20260307_105756.tsv"
    input_fields: !include 2_test_data_ST22_dummy/input_fields/amr_data.yaml
    wrangling: !include 2_test_data_ST22_dummy/wrangling/amr_data.yaml
  plasmid_data:
    source:
      type: "local_tsv"
      path: "assets/test_data/1_test_data_ST22_dummy/test_data_PlasmidFinder_20260307_105756.tsv"
    input_fields: !include 2_test_data_ST22_dummy/input_fields/plasmid_data.yaml
