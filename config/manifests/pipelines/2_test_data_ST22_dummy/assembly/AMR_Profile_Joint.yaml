# @deps
# provides: assembly:AMR_Profile_Joint
# consumes: action:mutate, action:join, action:cast, action:sort, dataset:amr_data, dataset:metadata_schema
# include_parent: config/manifests/pipelines/2_test_data_ST22_dummy.yaml
# consumed_by: config/manifests/pipelines/2_test_data_ST22_dummy.yaml, libs/transformer/tests/debug_assembler.py
# doc: .agents/rules/rules_manifest_structure.md#7
# @end_deps
recipe:
  tier1:
    # Step 1: Clean predicted_phenotype into normalized slug for multi-resistance detection
    # (Must run before join — column is in amr_data, the base ingredient)
    - action: mutate
      column: predicted_phenotype_clean
      expression: "pl.col('predicted_phenotype').str.strip_chars().str.to_lowercase()"

    # Step 2: Join metadata (Source, Year, Country) on sample_id
    # Note: 'on' is quoted — bare 'on' is a YAML boolean True (rules_manifest_structure.md §7)
    - action: join
      right_ingredient: metadata_schema
      'on': sample_id
      how: inner

    # Step 3: Cast Year: float → Int64 → String for clean discrete axis ("2022" not "2022.0")
    # Two-step cast required because TSV infers Year as float; String cast of float gives "2022.0"
    - action: cast
      columns: [Year]
      dtype: Int64

    - action: cast
      columns: [Year]
      dtype: String

    # Step 4: Compute multi-resistance boolean flag (sample carries >1 distinct resistance class)
    - action: mutate
      column: is_multi_resistant_bool
      expression: "pl.col('predicted_phenotype_clean').n_unique().over('sample_id') > 1"

    # Step 5: Convert boolean flag to Yes/No string for display
    - action: mutate
      column: Multiresistant
      expression: "pl.when(pl.col('is_multi_resistant_bool')).then(pl.lit('Yes')).otherwise(pl.lit('No'))"

    # Step 6: Sort for reproducible output ordering
    - action: sort
      columns: [Year, Source, Country]
