id: "STRESS_FINAL"
info:
  display_name: "STRESS: Master Verification"
  description: "Bulletproof stress test manifest for Phase 12-A verification."

data_schemas:
  Stress_Source:
    source:
      type: "local_tsv"
      path: "assets/test_data/STRESS/STRESS_data.tsv"
    input_fields:
      id: { type: "string", is_primary_key: true }
      species: { type: "string" }
      amr_class: { type: "string" }
      collection_date: { type: "string" }
      value: { type: "string" }
    wrangling:
      tier1:
        - action: "rename"
          mapping:
            id: "sample_id"
    output_fields:
      - name: sample_id
        type: string
      - name: species
        type: string
      - name: amr_class
        type: string

assembly_manifests:
  Master_Collection:
    ingredients:
      - dataset_id: "Stress_Source"
    recipe:
      tier1: []

plots:
  final_plot:
    title: "Master Proof: 10,000 Rows Distribution"
    mapping:
      x: "species"
      fill: "amr_class"
    layers:
      - name: "geom_bar"
        params:
          stat: "count"
          position: "dodge"
      - name: "labs"
        params:
          title: "STRESS TEST: Species x AMR Distribution"
          x: "Species"
          y: "Observed Count"
