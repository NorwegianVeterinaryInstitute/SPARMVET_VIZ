id: "STRESS_project"
info:
  display_name: "UI Stress Test Project"
  description: "A 10,000 row dataset for verifying Tier 3 responsiveness and Comparison Theater."

data_schemas:
  Stress_Data_Source:
    source:
      type: "local_tsv"
      path: "assets/test_data/STRESS/STRESS_data.tsv"
    input_fields: !include 'STRESS_project/input_fields/Stress_Data_Source_input_fields.yaml'
    wrangling: !include 'STRESS_project/wrangling/Stress_Data_Source_wrangling.yaml'
    output_fields: !include 'STRESS_project/output_fields/Stress_Data_Source_output_fields.yaml'

assembly_manifests:
  STRESS_Collection:
    ingredients:
      - dataset_id: "Stress_Data_Source"
    recipe: !include 'STRESS_project/wrangling/STRESS_Collection_recipe.yaml'

plots:
  stress_plot: !include 'STRESS_project/plots/stress_plot.yaml'
