id: "STRESS_project"
info:
  display_name: "UI Stress Test Project"
  description: "A 10,000 row dataset for verifying Tier 3 responsiveness and Comparison Theater."

data_schemas:
  Stress_Data_Source:
    source:
      type: "local_tsv"
      path: "assets/test_data/STRESS/STRESS_data.tsv"
    input_fields:
      id: { type: "string", is_primary_key: true }
      species: { type: "string" }
      collection_date: { type: "string" }
      amr_class: { type: "string" }
      value: { type: "string" }
    wrangling:
      tier1:
        - action: "strip_whitespace"
          columns: ["species", "amr_class"]
        - action: "rename"
          mapping:
            id: "sample_id"
    output_fields:
      - name: sample_id
        type: string
      - name: species
        type: string
      - name: collection_date
        type: string
      - name: amr_class
        type: string
      - name: value
        type: string

assembly_manifests:
  STRESS_Collection:
    ingredients:
      - dataset_id: "Stress_Data_Source"
    recipe:
      tier1: []

# Top-level wrangling for Tier 2 transforms (plots)
wrangling:
  tier2:
    - action: "summarize"
      group_by: ["species", "amr_class"]
      columns: ["sample_id"]
      agg: "count"
      new_name: "record_count"

plots:
  stress_plot:
    title: "Stress Test Plot"
    mapping:
      x: "species"
      y: "record_count"
      fill: "amr_class"
    layers:
      - action: "geom_bar"
        stat: "identity"
        position: "dodge"
