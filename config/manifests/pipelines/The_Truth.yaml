id: "The_Truth"
info:
  display_name: "STRESS: The Absolute Truth"
  description: "Verified manifest for Comparison Theater Stress Test."

data_schemas:
  Primary_Source:
    source:
      type: "local_tsv"
      path: "assets/test_data/STRESS/STRESS_data.tsv"
    input_fields:
      id: { type: "string", is_primary_key: true }
      species: { type: "string" }
      amr_class: { type: "string" }
    wrangling:
      tier1:
        - action: "rename"
          mapping: { id: "sample_id" }
    output_fields:
      - name: sample_id
        type: string
      - name: species
        type: string
      - name: amr_class
        type: string

assembly_manifests:
  Master_Collection:
    ingredients:
      - dataset_id: "Primary_Source"
    recipe:
      tier1: []

plots:
  master_plot:
    title: "10,000 Row Species Distribution"
    mapping:
      x: "species"
      fill: "amr_class"
    layers:
      - name: "geom_bar"
        params:
          stat: "count"
          position: "dodge"
      - name: "labs"
        params:
          title: "Phase 12-A Verification: 10,000 Rows"
          x: "Species"
          y: "Count"
