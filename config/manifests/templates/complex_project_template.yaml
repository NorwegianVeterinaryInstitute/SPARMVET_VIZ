# Complex Project Template
# Use this for large-scale projects requiring modularity and shared fragments.

id: complex_project_demo
type: project
info:
  display_name: "Complex Enterprise Project"
  description: "Modular manifest using !include for relational integrity and reuse."
  version: "1.0"

data_schemas:
  genomics:
    source:
      type: "local_tsv"
      path: "./assets/test_data/genomics_data.tsv"
    input_fields: !include 'complex_demo/genomics_input.yaml'
    wrangling: !include 'complex_demo/genomics_wrangling.yaml'
    output_fields: ["sample_id", "gene_presence"]

metadata:
  source:
    type: "local_tsv"
    path: "./assets/test_data/metadata.tsv"
  input_fields: !include 'complex_demo/metadata_input.yaml'

assembly_manifests:
  master_assembly:
    description: "Joins genomics with metadata."
    ingredients:
      - dataset_id: "genomics"
      - dataset_id: "metadata"
    recipe: !include 'complex_demo/master_recipe.yaml'
    final_contract: !include 'complex_demo/final_contract.yaml'
