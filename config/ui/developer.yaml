# config/ui/developer.yaml
# SPARMVET_VIZ Persona Manager Configuration: Developer Mode
# ADR-026: Persona Isolation & Reporting

persona: "developer"

features:
  allow_branching: true
  allow_manifest_edit: true
  allow_developer_console: true
  
demo_filters:
  - id: "sample_date"
    label: "Collection Date"
    type: "date_range"
  - id: "species"
    label: "Microbial Species"
    type: "select_multiple"
  - id: "country"
    label: "Origin Country"
    type: "select_multiple"
  - id: "amr_class"
    label: "AMR Resistance Class"
    type: "select_multiple"

export_settings:
  format: "zip"
  include_audit_log: true
  include_manifest: true
  include_raw_data_subset: true
  include_debug_trace: true
  dpi: 600
