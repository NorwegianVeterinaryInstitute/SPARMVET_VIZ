# UI Persona: Pipeline Exploration Simple
persona_name: "pipeline-exploration-simple"
persona_id: "pipeline-exploration-simple"
display_name: "Pipeline Exploration - Simple"
logic_access: "Basic"

features:
  # Can the user interact with the Tier 3 View? (Toggleable/Collapsible)
  interactivity_enabled: true
  # Does the user have access to the Developer Studio / Wrangle Studio tools?
  developer_mode_enabled: false
  wrangle_studio_enabled: true
  # Does the user have access to the Gallery Browser?
  gallery_enabled: false
  # Comparison Theater (Phase 12-A)
  comparison_mode_enabled: true
  # Session Management visibility
  session_management_enabled: true
  # External Import helper visibility
  import_helper_enabled: false
  # Can the user export data bundles (Zip)?
  export_bundle_enabled: true

automation:
  ghost_save:
    enabled: true
    frequency_minutes: 2
