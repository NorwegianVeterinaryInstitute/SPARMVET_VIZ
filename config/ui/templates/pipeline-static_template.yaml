# UI Persona: Pipeline Static
persona_name: "pipeline-static"
persona_id: "pipeline-static"
display_name: "Automated Pipeline - Static"
logic_access: "None"

features:
  # Can the user interact with the Tier 3 View?
  interactivity_enabled: false
  # Does the user have access to the Developer Studio / Wrangle Studio tools?
  developer_mode_enabled: false
  # Does the user have access to the Gallery Browser?
  gallery_enabled: false
  # Comparison Theater
  comparison_mode_enabled: false
  # Session Save / Import / ghost save
  session_management_enabled: false
  # External Import helper (multi-file data ingestion + Excel converter)
  import_helper_enabled: false
  # Can the user export data bundles (Zip)?
  export_bundle_enabled: true
  # Can the user export the active single graph?
  export_graph_enabled: false
  # Can the user upload replacement metadata (triggers T1 rebuild)?
  metadata_ingestion_enabled: false
  # Can the user ingest raw data files / Excel uploads?
  data_ingestion_enabled: false

automation:
  ghost_save:
    enabled: false
    frequency_minutes: 1
