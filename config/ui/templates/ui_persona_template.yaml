# UI Persona Template Configuration
# Authority: Controls VISUAL and FUNCTIONAL masking only. 
# DOES NOT control system paths (See config/connectors).

persona_id: "template_persona"
display_name: "Default Template User"

# Toggle specific UI functionalities and data engagement capabilities
features:
  # Can the user interact with the Tier 3 View?
  interactivity_enabled: true
  
  # Does the user have access to the Developer Studio / Wrangle Studio tools?
  developer_mode_enabled: false
  
  # Does the user have access to the Gallery Browser?
  gallery_enabled: true

  # Comparison Theater (Phase 12-A)
  comparison_mode_enabled: true
  
  # Is the Right Sidebar 'Audit Stack' and 'Logic Inheritance' allowed to be manually deleted by the user?
  allow_tier2_node_deletion: true
  
  # Can the user export data bundles (Zip)?
  export_bundle_enabled: true

# Session Automation
automation:
  ghost_save:
    enabled: true
    # Frequency in minutes for automated save events
    frequency_minutes: 2
