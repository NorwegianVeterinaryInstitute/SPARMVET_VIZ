# UI Persona: Web Demo
# Lightweight public-facing view — exploration + export, no ingestion tools,
# persona badge hidden, suitable for embedding in a webpage or demo session.
persona_name: "web-demo"
persona_id: "web-demo"
display_name: "Web Demo"
logic_access: "Basic"
theme_css: "config/ui/theme.css"

features:
  interactivity_enabled: true
  developer_mode_enabled: false
  wrangle_studio_enabled: false
  gallery_enabled: true
  comparison_mode_enabled: false
  session_management_enabled: false
  import_helper_enabled: false
  t3_sandbox_enabled: false
  export_bundle_enabled: true
  export_graph_enabled: true
  audit_report_enabled: false
  metadata_ingestion_enabled: false
  data_ingestion_enabled: false
  # Clean presentation: no data import panel, no persona badge
  data_import_panel_visible: false
  show_persona_badge: false

manifest_selector:
  visible: false
  fixed_manifest: 1_test_data_ST22_dummy

testing_mode: false

automation:
  ghost_save:
    enabled: false

