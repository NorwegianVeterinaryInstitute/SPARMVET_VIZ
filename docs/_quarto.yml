project:
  type: book
  output-dir: ../_book




book:
  title: "Bioinformatics Dashboard: Walking Skeleton"
  # Add a logo to the sidebar for a pro look
  # logo: assets/logo.png

  repo-url: https://github.com/NorwegianVeterinaryInstitute/SPARMVET_VIZ
  repo-branch: main  
  repo-subdir: docs
  repo-actions: [edit, issue, source]

  sidebar:
    style: "docked"
    search: true
    collapse-level: 1 

  author: 
    - name: "Eve Fiskebeck"
    - name: "Gemini (2026-02): DashBoard Architect Agent."

  date: last-modified

  chapters:
  - front_page.qmd
  - index.qmd

  - part: "Architecture & Specification"
    chapters:
      - architecture/core_architecture.qmd
      - architecture/core_architecture_code.qmd
      #- architecture/c4_model.qmd
      # MUST BE IN DIRECTORY BUT NOT BUILD - THEY ARE ADDED as FILE 
      # _mermaid.mmd the architecture diagram in mermaid format (for easy editing and versioning) 
      
  - part: "Module Reference"
    chapters:
      - modules/configuration.qmd #ca ok
      - modules/connector.qmd #frame rest after when done
      - modules/utils.qmd # ca ok 
      - modules/ingestion.qmd # ca ok 
      - modules/wrangling.qmd #ca ok
      - modules/visualisation_factory.qmd #ca ok
      - modules/dashboard_app.qmd #ca ok 

  # NEED REVIEW 
  - part: "General Development Guidelines" 
    chapters:
      #- guide/developer_how_to.qmd # where is that going
      - guide/development_rules.qmd
      - guide/new_data_contract.qmd
      - guide/new_species.qmd
      - guide/additional_utilities.qmd
      - guide/user_preferences.qmd
      - guide/testing.qmd
  
  - part: "Developers Cheatsheets: HOW TO"
    chapters:
    # We need to split this into multiple logic files 
      - cheatsheets/python_environment.qmd
      - cheatsheets/testing_utilities.qmd
      - cheatsheets/running_helper_scripts.qmd
      - cheatsheets/wrangling_actions.qmd
  

  - part : "Implementation Production"

  # NOT REVIEWED YET 
  - part: "Appendix"

    chapters:
      - appendix/out_of_the_box_configs.qmd
      - appendix/AI_and_development_process.qmd
      - appendix/External_ressources.qmd
      - appendix/Standards_yaml.qmd 
      - appendix/Terminology.qmd
      # FOR NOW ITS MORE NOTES
      - appendix/Shiny_flavors.md
      - appendix/Libraries_choices.qmd
      - appendix/Unknowns_and_Expansion.qmd

format:
  html:
    theme: 
      light: [flatly, custom.scss] # We can add custom styling here
      dark: [darkly, custom.scss]
    code-copy: true         # Essential for a reference guide
    code-overflow: wrap    # Prevents long lines from breaking layout
    code-fold: true
    code-summary: "View Implementation Details"
    toc: true
    toc-depth: 3
    number-sections: true
    smooth-scroll: true    # Makes navigation feel premium
    highlight-style: monokai # A bit more "dev" than standard github style

execute:
  freeze: auto
  execute-dir: project


