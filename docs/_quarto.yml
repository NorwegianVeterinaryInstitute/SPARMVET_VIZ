project:
  type: book
  output-dir: ../_book




book:
  title: "Bioinformatics Dashboard: Walking Skeleton"
  # Add a logo to the sidebar for a pro look
  # logo: assets/logo.png

  repo-url: https://github.com/NorwegianVeterinaryInstitute/SPARMVET_VIZ
  repo-branch: main  
  repo-subdir: docs
  repo-actions: [edit, issue, source]

  sidebar:
    style: "docked"
    search: true
    collapse-level: 1 

  author: 
    - name: "Eve Fiskebeck"
    - name: "Gemini (2026-02): DashBoard Architect Agent."

  date: last-modified

  chapters:
  # [Root]: Core landing and entry points
  - front_page.qmd # The title and main hook
  - index.qmd # The table of contents and introduction

  - part: "Vision"
    # [vision/]: Strategic goals and future-state platform architecture
    chapters:
      - vision/platform_evolution.qmd # Transitioning to the "User-as-Artist" gallery pattern

  - part: "Foundations"
    # [foundations/]: Core architectural principles, ADRs, and heavy-lifting logic
    chapters:
      - foundations/core_architecture.qmd # The top-level decoupled logic (Connector -> Ingestor -> Transformer -> Orchestrator -> Viz Factory)
      - foundations/core_architecture_code.qmd # Deep dive into the physical codebase layout backing the architecture
      - foundations/data_contracts_adr.qmd # ADR-013 explaining YAML dict manifests vs rigid JSON schemas
      - foundations/data_tiering_adr.qmd # ADR-024 explaining Tier 1 (Anchor Parquet) vs Tier 2 (View) performance logic
      - foundations/verification_protocol.qmd # The @verify gate and explicit evidence-driven testing requirements
      
  - part: "Workflows"
    # [workflows/]: Step-by-step guides for the operational pipelines
    chapters:
      - workflows/generator_utils.qmd # Scripts used to scaffold manifests and synthetic data
      - workflows/connector.qmd # Reaching out to external APIs (e.g. Galaxy)
      - workflows/ingestion.qmd # Validating incoming data against the contract
      - workflows/wrangling.qmd # The 4-Phase pipeline: Atomic cleaning, joining, and persisting
      - workflows/visualisation_factory.qmd # Declarative YAML mapping to Plotnine Geoms using the Evidence Loop
      - workflows/dashboard_app.qmd # The Shiny UI and Server Reactive logic bridging it all
      - workflows/user_preferences.qmd # How frontend users can tweak layouts without breaking code
      
  - part: "Developer Guide"
    # [reference/]: Strict rules, conventions, and galleries for developers writing the Python code
    chapters:
      - reference/development_rules.qmd # Mandatory SPARMVET Laws (Violet Law, Integrity Mandate, Clean Lines)
      - reference/testing.qmd # How to execute Pytest and run the Integrity Suites (.venv/bin/python libs/...)
      - reference/decorator_testing.qmd # Deep-dive on the 1:1:1 Test Triplet for new pipeline elements
      - reference/debugging_pipelines.qmd # How to use the assets/scripts debuggers to isolate pipeline breakage
      - reference/developer_how_to.qmd # Practical cookbook for contributing to the repo

  - part: "Technical Appendix"
    chapters:
      - appendix/transformer_actions.qmd # The exhaustive Action Gallery with concrete YAML usage examples
      - appendix/viz_factory_components.qmd # The Plot Component Gallery providing YAML aesthetic recipes  
      - appendix/data_types_philosophy.qmd
      - appendix/Libraries_choices.qmd
      - appendix/python_environment.qmd
      - appendix/running_helper_scripts.qmd
      - appendix/Standards_yaml.qmd 
      - appendix/viz_factory_rationale.qmd
      - appendix/Terminology.qmd
      - appendix/Shiny_flavors.qmd
      - appendix/External_ressources.qmd
      - appendix/Unknowns_and_Expansion.qmd
      - appendix/AI_and_development_process.qmd
      - appendix/DashBoard_Architect_v1.qmd
      - appendix/FAQ.qmd
      - appendix/audit_benchmarks_st22.qmd


format:
  html:
    theme: 
      light: [flatly, custom.scss] # We can add custom styling here
      dark: [darkly, custom.scss]
    code-copy: true         # Essential for a reference guide
    code-overflow: wrap    # Prevents long lines from breaking layout
    code-fold: true
    code-summary: "View Implementation Details"
    toc: true
    toc-depth: 3
    number-sections: true
    smooth-scroll: true    # Makes navigation feel premium
    highlight-style: monokai # A bit more "dev" than standard github style

execute:
  freeze: auto
  execute-dir: project


# TODO make it look better, incl. numbering or not

editor: source