project:
  type: book
  output-dir: ../_book




book:
  title: "Bioinformatics Dashboard: Walking Skeleton"
  # Add a logo to the sidebar for a pro look
  # logo: assets/logo.png

  repo-url: https://github.com/NorwegianVeterinaryInstitute/SPARMVET_VIZ
  repo-branch: main  
  repo-subdir: docs
  repo-actions: [edit, issue, source]

  sidebar:
    style: "docked"
    search: true
    collapse-level: 1 

  author: 
    - name: "Eve Fiskebeck"
    - name: "Gemini (2026-02): DashBoard Architect Agent."

  date: last-modified

  chapters:
  - front_page.qmd
  - index.qmd

  - part: "Vision"
    chapters:
      - vision/platform_evolution.qmd

  - part: "Foundations"
    chapters:
      - foundations/core_architecture.qmd
      - foundations/core_architecture_code.qmd
      - foundations/data_contracts_adr.qmd
      - foundations/verification_protocol.qmd
      
  - part: "Workflows"
    chapters:
      - workflows/generator_utils.qmd
      - workflows/connector.qmd
      - workflows/ingestion.qmd
      - workflows/wrangling.qmd
      - workflows/visualisation_factory.qmd
      - workflows/dashboard_app.qmd
      - workflows/user_preferences.qmd

  - part: "Reference"
    chapters:
      - reference/development_rules.qmd
      - reference/testing.qmd
      - reference/decorator_testing.qmd
      - reference/debugging_pipelines.qmd
      - reference/developer_how_to.qmd

  - part: "Technical Appendix"
    chapters:
      - appendix/data_types_philosophy.qmd
      - appendix/Libraries_choices.qmd
      - appendix/python_environment.qmd
      - appendix/running_helper_scripts.qmd
      - appendix/Standards_yaml.qmd 
      - appendix/viz_factory_rationale.qmd
      - appendix/Terminology.qmd
      - appendix/Shiny_flavors.qmd
      - appendix/External_ressources.qmd
      - appendix/Unknowns_and_Expansion.qmd
      - appendix/AI_and_development_process.qmd
      - appendix/DashBoard_Architect_v1.qmd


format:
  html:
    theme: 
      light: [flatly, custom.scss] # We can add custom styling here
      dark: [darkly, custom.scss]
    code-copy: true         # Essential for a reference guide
    code-overflow: wrap    # Prevents long lines from breaking layout
    code-fold: true
    code-summary: "View Implementation Details"
    toc: true
    toc-depth: 3
    number-sections: true
    smooth-scroll: true    # Makes navigation feel premium
    highlight-style: monokai # A bit more "dev" than standard github style

execute:
  freeze: auto
  execute-dir: project


# TODO make it look better, incl. numbering or not

editor: source