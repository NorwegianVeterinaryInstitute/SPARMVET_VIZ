id: derive_categories_test
name: Derive Categories Action Test
data_schemas:
  test_dataset:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/derive_categories_test.tsv
    input_fields:
      sample_id:
        type: utf8
      species:
        type: utf8
      resistance_genes:
        type: utf8
    wrangling:
      tier1:
      - action: derive_categories
        columns:
        - resistance_genes
        target_column: resistance_classes
        separator: ', '
        reference_file: config/references/amr_phenotypes/test_amr_categories_phenotype.tsv
        lookup_right: gene_id
        extract_column: phenotype_class
    output_fields:
      sample_id:
        type: utf8
      species:
        type: categorical
      resistance_genes:
        type: utf8
      resistance_classes:
        type: categorical
