id: drop_columns_test
name: Drop Columns Action Test
data_schemas:
  test_drop:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/drop_columns_test.tsv
    input_fields:
      sample_id:
        is_primary_key: true
        original_name: sample_id
        type: categorical
        label: Sample Id
      val_to_round:
        original_name: val_to_round
        type: categorical
        label: Val To Round
      val_to_filter:
        original_name: val_to_filter
        type: categorical
        label: Val To Filter
      raw_string:
        original_name: raw_string
        type: categorical
        label: Raw String
    wrangling:
      tier1:
      - action: drop_columns
        columns:
        - val_to_round
        - raw_string
    output_fields:
      sample_id:
        is_primary_key: true
        original_name: sample_id
        type: categorical
        label: Sample Id
      val_to_filter:
        original_name: val_to_filter
        type: categorical
        label: Val To Filter
