id: drop_nulls_test
name: Drop Nulls Action Test
data_schemas:
  test_dataset:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/drop_nulls_test.tsv
    input_fields:
      sample_id:
        type: categorical
        original_name: sample_id
        label: Sample Id
      species:
        type: categorical
        original_name: species
        label: Species
      resistance_genes:
        type: i64
        original_name: resistance_genes
        label: Resistance Genes
    wrangling:
      tier1:
      - action: drop_nulls
        columns:
        - species
        - resistance_genes
    output_fields:
      sample_id:
        original_name: sample_id
        type: categorical
        label: Sample Id
      species:
        original_name: species
        type: categorical
        label: Species
      resistance_genes:
        original_name: resistance_genes
        type: categorical
        label: Resistance Genes
