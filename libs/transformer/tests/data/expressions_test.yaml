pipeline_id: expressions_verification
input_fields:
  col_int:
    original_name: col_int
    type: numeric
    label: Col Int
  col_str:
    original_name: col_str
    type: categorical
    label: Col Str
  col_fallback:
    original_name: col_fallback
    type: categorical
    label: Col Fallback
  col_score:
    original_name: col_score
    type: numeric
    label: Col Score
wrangling:
  tier1:
  - action: cast
    columns:
    - col_str
    dtype: Int64
  - action: coalesce
    columns:
    - col_int
    - col_score
  - action: label_if
    column: col_score
    new_column: performance
    predicate: '>='
    value: 50
    then: PASS
    otherwise: FAIL
output_fields:
  col_int:
    original_name: col_int
    type: categorical
    label: Col Int
  col_str:
    original_name: col_str
    type: categorical
    label: Col Str
  performance:
    original_name: performance
    type: categorical
    label: Performance
