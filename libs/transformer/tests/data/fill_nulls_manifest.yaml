id: fill_nulls_test
name: Fill Nulls Action Test
data_schemas:
  test_dataset:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/fill_nulls_test.tsv
    input_fields:
      sample_id:
        type: categorical
        original_name: sample_id
        label: Sample Id
      species:
        type: categorical
        original_name: species
        label: Species
      resistance_genes:
        type: i64
        original_name: resistance_genes
        label: Resistance Genes
      category:
        type: categorical
        original_name: category
        label: Category
    wrangling:
      tier1:
      - action: fill_nulls
        columns:
        - species
        - category
        value: Unknown
      - action: fill_nulls
        columns:
        - resistance_genes
        value: 0
    output_fields:
      sample_id:
        original_name: sample_id
        type: categorical
        label: Sample Id
      species:
        original_name: species
        type: categorical
        label: Species
      resistance_genes:
        original_name: resistance_genes
        type: categorical
        label: Resistance Genes
      category:
        original_name: category
        type: categorical
        label: Category
