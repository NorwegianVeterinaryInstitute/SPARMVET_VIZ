id: bacterial_fill_nulls_manifest
data_schemas:
  bacterial_fill_nulls:
    fields:
      sample_id: {categories: ["metadata"]}
      isolate_id: {categories: ["metadata"]}
      species: {categories: ["taxonomy"]}
      serotype: {categories: ["taxonomy"]}
      st_type: {categories: ["typing"]}
      resistance_genes: {categories: ["counts"]}
      biocide_genes: {categories: ["counts"]}
      antimicrobial_score: {categories: ["scores"]}
    wrangling:
      - action: "fill_nulls"
        columns: ["species"]
        value: "Unknown Species"
      - action: "fill_nulls"
        columns: ["serotype"]
        value: "Not Typed"
      - action: "fill_nulls"
        columns: ["st_type"]
        value: "ND"
      - action: "fill_nulls"
        columns: ["resistance_genes", "biocide_genes"]
        value: 0
      - action: "fill_nulls"
        columns: ["antimicrobial_score"]
        value: 0.0
