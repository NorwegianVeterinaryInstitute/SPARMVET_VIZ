id: "filter_range_test"
name: "Filter Range Action Test"
data_schemas:
  test_filter:
    source:
      type: "local_tsv"
      path: "libs/transformer/tests/data/filter_range_test.tsv"
    input_fields:
      sample_id: { is_primary_key: true }
      val_to_filter: { type: "numeric" }
    wrangling:
       - action: "filter_range"
         column: "val_to_filter"
         min: 10
         max: 50
    output_fields:
      sample_id: { is_primary_key: true }
      val_to_filter: {}
