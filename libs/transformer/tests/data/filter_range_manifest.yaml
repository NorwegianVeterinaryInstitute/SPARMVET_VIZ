id: filter_range_test
name: Filter Range Action Test
data_schemas:
  test_filter:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/filter_range_test.tsv
    input_fields:
      sample_id:
        is_primary_key: true
        original_name: sample_id
        type: categorical
        label: Sample Id
      val_to_filter:
        type: numeric
        original_name: val_to_filter
        label: Val To Filter
    wrangling:
      tier1:
      - action: filter_range
        column: val_to_filter
        min: 10
        max: 50
    output_fields:
      sample_id:
        is_primary_key: true
        original_name: sample_id
        type: categorical
        label: Sample Id
      val_to_filter:
        original_name: val_to_filter
        type: categorical
        label: Val To Filter
