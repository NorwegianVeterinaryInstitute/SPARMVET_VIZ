id: keep_columns_test
name: Keep Columns Action Test
data_schemas:
  test_dataset:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/keep_columns_test.tsv
    input_fields:
      sample_id:
        is_primary_key: true
        type: numeric
        original_name: sample_id
        label: Sample Id
      species:
        type: categorical
        original_name: species
        label: Species
      resistance:
        type: categorical
        original_name: resistance
        label: Resistance
      date:
        type: categorical
        original_name: date
        label: Date
      extra_info:
        type: categorical
        original_name: extra_info
        label: Extra Info
    wrangling:
      tier1:
      - action: keep_columns
        columns:
        - species
        - resistance
    output_fields:
      sample_id:
        original_name: sample_id
        type: categorical
        label: Sample Id
      species:
        original_name: species
        type: categorical
        label: Species
      resistance:
        original_name: resistance
        type: categorical
        label: Resistance
