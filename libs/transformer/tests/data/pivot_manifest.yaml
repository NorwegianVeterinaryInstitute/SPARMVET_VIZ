id: pivot_test
description: Testing long to wide transformation (ADR-024 Phase 1)
input_fields:
  sample_id:
    original_name: Sample_ID
    type: categorical
    label: Sample Id
  antibiotic:
    original_name: Antibiotic
    type: categorical
    label: Antibiotic
  result:
    original_name: Result
    type: categorical
    label: Result
wrangling:
  tier1:
  - action: pivot
    index:
    - Sample_ID
    true: Antibiotic
    values: Result
    aggregate_function: first
output_fields:
  sample_id:
    original_name: Sample_ID
    type: categorical
    label: Sample Id
  ampicillin:
    original_name: Ampicillin
    type: categorical
    label: Ampicillin
  tetracycline:
    original_name: Tetracycline
    type: categorical
    label: Tetracycline
