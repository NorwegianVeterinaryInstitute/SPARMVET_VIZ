id: regex_extract_test
name: Regex Extract Action Test
data_schemas:
  test_dataset:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/regex_extract_test.tsv
    input_fields:
      sample_id:
        is_primary_key: true
        original_name: sample_id
        type: categorical
        label: Sample Id
      raw_string:
        type: categorical
        original_name: raw_string
        label: Raw String
    wrangling:
      tier1:
      - action: regex_extract
        source: raw_string
        pattern: v([0-9])\.
        target_column: v_major
        group: 1
    output_fields:
      sample_id:
        original_name: sample_id
        type: categorical
        label: Sample Id
      v_major:
        original_name: v_major
        type: categorical
        label: V Major
