id: rename_test
name: Rename Action Test
data_schemas:
  test_dataset:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/rename_test.tsv
    input_fields:
      sample_id:
        type: categorical
        original_name: sample_id
        label: Sample Id
      ST:
        type: categorical
        original_name: ST
        label: St
    wrangling:
      tier1:
      - action: rename
        mapping:
          sample_id: new_id
          ST: new_ST
    output_fields:
      new_id:
        original_name: new_id
        type: categorical
        label: New Id
      new_ST:
        original_name: new_ST
        type: categorical
        label: New St
