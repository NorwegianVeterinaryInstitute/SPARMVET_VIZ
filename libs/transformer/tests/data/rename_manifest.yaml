id: "rename_test"
name: "Rename Action Test"
data_schemas:
  test_dataset:
    source:
      type: "local_tsv"
      path: "libs/transformer/tests/data/rename_test.tsv"
    input_fields:
      id: { type: "utf8" }
      old_val: { type: "utf8" }
    wrangling:
      - action: "rename"
        mapping:
          id: "new_id"
          old_val: "new_val"
    output_fields:
      new_id: {}
      new_val: {}
