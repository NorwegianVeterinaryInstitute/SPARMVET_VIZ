id: replace_values_test
name: Replace Values Action Test
data_schemas:
  test_dataset:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/replace_values_test.tsv
    input_fields:
      sample_id:
        type: categorical
        original_name: sample_id
        label: Sample Id
      isolate_id:
        type: categorical
        original_name: isolate_id
        label: Isolate Id
      serotype:
        type: categorical
        original_name: serotype
        label: Serotype
      st_type:
        type: categorical
        original_name: st_type
        label: St Type
      resistance_genes:
        type: i64
        original_name: resistance_genes
        label: Resistance Genes
    wrangling:
      tier1:
      - action: replace_values
        columns:
        - serotype
        - st_type
        to_replace:
        - ND
        - Unknown
        - '-'
        new_value: Not Typed
    output_fields:
      sample_id:
        original_name: sample_id
        type: categorical
        label: Sample Id
      isolate_id:
        original_name: isolate_id
        type: categorical
        label: Isolate Id
      serotype:
        original_name: serotype
        type: categorical
        label: Serotype
      st_type:
        original_name: st_type
        type: categorical
        label: St Type
      resistance_genes:
        original_name: resistance_genes
        type: categorical
        label: Resistance Genes
