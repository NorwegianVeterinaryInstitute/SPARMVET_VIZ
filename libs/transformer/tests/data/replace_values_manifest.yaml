data_schemas:
  bacterial_replace_values:
    wrangling:
    - action: replace_values
      columns:
      - serotype
      - st_type
      to_replace:
      - ND
      - Unknown
      - '-'
      new_value: Not Typed
    input_fields:
      sample_id: utf8
      isolate_id: utf8
      serotype: utf8
      st_type: utf8
      resistance_genes: i64
    output_fields:
      sample_id: utf8
      isolate_id: utf8
      serotype: utf8
      st_type: utf8
      resistance_genes: i64
