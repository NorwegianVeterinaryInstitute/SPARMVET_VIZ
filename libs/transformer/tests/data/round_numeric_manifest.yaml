id: round_numeric_test
name: Round Numeric Action Test
data_schemas:
  test_round:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/round_numeric_test.tsv
    input_fields:
      sample_id:
        is_primary_key: true
        original_name: sample_id
        type: categorical
        label: Sample Id
      val_to_round:
        original_name: val_to_round
        type: categorical
        label: Val To Round
    wrangling:
      tier1:
      - action: round_numeric
        columns:
        - val_to_round
        decimals: 2
    output_fields:
      sample_id:
        is_primary_key: true
        original_name: sample_id
        type: categorical
        label: Sample Id
      val_to_round:
        original_name: val_to_round
        type: categorical
        label: Val To Round
