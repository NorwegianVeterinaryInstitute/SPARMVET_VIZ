id: sanitize_column_names_test
name: Sanitize Column Names Action Test
data_schemas:
  test_dataset:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/sanitize_column_names_test.tsv
    input_fields:
      '   SampleID':
        is_primary_key: true
        original_name: '   SampleID'
        type: categorical
        label: '   Sampleid'
      Dirty Data (v1):
        type: categorical
        original_name: Dirty Data (v1)
        label: Dirty Data (V1)
    wrangling:
      tier1:
      - action: sanitize_column_names
    output_fields:
      sampleid:
        type: categorical
        original_name: sampleid
        label: Sampleid
      dirty_data_v1:
        type: categorical
        original_name: dirty_data_v1
        label: Dirty Data V1
