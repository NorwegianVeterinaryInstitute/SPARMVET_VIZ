id: split_and_explode_test
name: Split and Explode Action Test
data_schemas:
  test_dataset:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/split_and_explode_test.tsv
    input_fields:
      sample_id:
        type: categorical
        original_name: sample_id
        label: Sample Id
      species:
        type: categorical
        original_name: species
        label: Species
      resistance_genes:
        type: categorical
        original_name: resistance_genes
        label: Resistance Genes
    wrangling:
      tier1:
      - action: split_and_explode
        column: resistance_genes
        separator: ', '
    output_fields:
      sample_id:
        original_name: sample_id
        type: categorical
        label: Sample Id
      species:
        original_name: species
        type: categorical
        label: Species
      resistance_genes:
        original_name: resistance_genes
        type: categorical
        label: Resistance Genes
