# Test manifest for split_column
id: split_column_manifest
data_schemas:
  bacterial_split:
    fields:
      sample_id:
        type: numeric
        is_primary_key: true
      gene_protein:
        type: categorical
    wrangling:
      - action: "split_column"
        source: "gene_protein"
        new_columns: ["vf_gene", "vf_protein"]
        delimiter: ": "
        drop_source: true
