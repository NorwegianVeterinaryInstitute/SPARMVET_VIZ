data_schemas:
  bacterial_summarize:
    wrangling:
    - action: summarize
      columns:
      - resistance_genes
      group_by:
      - species
      - st_type
      agg: sum
      new_name: sum_resistance_genes
    input_fields:
      sample_id: utf8
      species: utf8
      st_type: utf8
      resistance_genes: i64
    output_fields:
      species: utf8
      st_type: utf8
      sum_resistance_genes: u32
