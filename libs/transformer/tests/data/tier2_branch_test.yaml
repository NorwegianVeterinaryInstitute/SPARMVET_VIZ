# Tier 2 Branch Test Manifest (ADR-024)
data_schemas:
  Trunk:
    source:
      type: "local_parquet"
      path: "tmp/session_anchor_test.parquet"

assembly_manifests:
  Tier2_Branch:
    ingredients:
      - dataset_id: "Trunk"
    recipe:
      - action: "summarize"
        group_by: "label_A"
        columns: "id"
        agg: "count"
        new_name: "record_count"
      - action: "sink_parquet"
        path: "tmp/branch_test_summary.parquet"
