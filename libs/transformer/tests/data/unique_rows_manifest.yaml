id: unique_rows_test
name: Unique Rows Action Test
data_schemas:
  test_dataset:
    source:
      type: local_tsv
      path: libs/transformer/tests/data/unique_rows_test.tsv
    input_fields:
      sample_id:
        type: categorical
        original_name: sample_id
        label: Sample Id
      isolate_id:
        type: categorical
        original_name: isolate_id
        label: Isolate Id
      species:
        type: categorical
        original_name: species
        label: Species
      run_date:
        type: categorical
        original_name: run_date
        label: Run Date
    wrangling:
      tier1:
      - action: unique_rows
    output_fields:
      sample_id:
        original_name: sample_id
        type: categorical
        label: Sample Id
      isolate_id:
        original_name: isolate_id
        type: categorical
        label: Isolate Id
      species:
        original_name: species
        type: categorical
        label: Species
      run_date:
        original_name: run_date
        type: categorical
        label: Run Date
