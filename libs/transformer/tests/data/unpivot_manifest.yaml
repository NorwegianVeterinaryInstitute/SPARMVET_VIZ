id: unpivot_test
description: Testing wide to long transformation (ADR-024 Phase 1)
input_fields:
  sample_id:
    original_name: Sample_ID
    type: categorical
    label: Sample Id
  ampicillin:
    original_name: Ampicillin
    type: categorical
    label: Ampicillin
  tetracycline:
    original_name: Tetracycline
    type: categorical
    label: Tetracycline
wrangling:
  tier1:
  - action: unpivot
    index:
    - Sample_ID
    true:
    - Ampicillin
    - Tetracycline
    variable_name: Antibiotic
    value_name: Result
output_fields:
  sample_id:
    original_name: Sample_ID
    type: categorical
    label: Sample Id
  antibiotic:
    original_name: Antibiotic
    type: categorical
    label: Antibiotic
  result:
    original_name: Result
    type: categorical
    label: Result
