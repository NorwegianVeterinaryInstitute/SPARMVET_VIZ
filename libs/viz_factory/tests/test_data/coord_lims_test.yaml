data_path: "./facet_test_data.tsv"
plots:
  lims_plot:
    mapping:
      x: "x"
      y: "y"
    layers:
      - name: "geom_point"
        params:
          size: 8
      - name: "coord_lims"
        params:
          xlim: [0, 5]
          ylim: [10, 20]
      - name: "theme_bw"
        params:
          base_size: 14
