data_path: "./facet_test_data.tsv"
plots:
  grid_plot:
    mapping:
      x: "x"
      y: "y"
    layers:
      - name: "geom_point"
        params:
          size: 5
      - name: "facet_grid"
        params:
          facets: "row_group ~ col_group"
      - name: "theme_bw"
        params:
          base_size: 14
