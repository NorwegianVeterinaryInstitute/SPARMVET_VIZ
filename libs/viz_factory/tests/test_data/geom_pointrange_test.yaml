data_path: "./geom_errorbar_test.tsv"
plots:
  pointrange_plot:
    mapping:
      x: "city"
      y: "mean"
      ymin: "lower"
      ymax: "upper"
    layers:
      - name: "geom_pointrange"
        params:
          color: "#4B0082"
          size: 1
          show_legend: false
      - name: "theme_minimal"
        params:
          base_size: 11
