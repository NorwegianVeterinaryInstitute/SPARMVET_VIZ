data_path: "./position_test_data.tsv"
plots:
  dodge2_plot:
    comparison: true
    mapping:
      x: "x"
      y: "y"
      fill: "group"
      color: "subgroup"
    layers:
      - name: "geom_bar"
        params:
          stat: "identity"
      - name: "position_dodge2"
        params:
          padding: 0.1
      - name: "theme_bw"
        params:
          base_size: 14
