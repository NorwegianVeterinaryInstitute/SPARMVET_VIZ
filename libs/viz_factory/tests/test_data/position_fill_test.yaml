data_path: "./position_test_data.tsv"
plots:
  fill_plot:
    comparison: true
    mapping:
      x: "x"
      y: "y"
      fill: "group"
      color: "subgroup"
    layers:
      - name: "geom_bar"
        params:
          stat: "identity"
          width: 0.8
      - name: "position_fill"
      - name: "theme_bw"
        params:
          base_size: 14
