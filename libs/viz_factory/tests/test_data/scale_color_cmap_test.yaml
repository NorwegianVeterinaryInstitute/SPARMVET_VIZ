id: "scale_color_cmap_test"
description: "Test for scale_color_cmap using a continuous mapped column"
input_fields: []
wrangling: []
output_fields: []
data_path: "./scale_color_gradient_test.tsv"
plots:
  cmap_plot:
    mapping:
      x: "x"
      y: "y"
      color: "y"
    layers:
      - name: "geom_point"
        params:
          size: 5
      - name: "scale_color_cmap"
        params:
          cmap_name: "viridis"
      - name: "theme_bw"
        params:
          base_size: 11
