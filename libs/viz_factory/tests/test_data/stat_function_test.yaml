id: stat_function_test
description: 'Test for stat_function: uses a string lambda evaluated at render time'
input_fields: []
wrangling:
  tier1: []
output_fields: []
data_path: ./scale_color_gradient_test.tsv
plots:
  function_plot:
    mapping:
      x: x
      y: y
    layers:
    - name: geom_point
    - name: stat_function
      params:
        fun: 'lambda x: x * 2'
        xlim:
        - 1
        - 5
    - name: theme_bw
      params:
        base_size: 11
